<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f8f8f8;
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 600px;
  padding: 20px;
}

.fadeUp {
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.8s ease;
}

.blur {
  opacity: 0;
  filter: blur(8px);
  transition: all 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}

button {
  padding: 10px 20px;
  border: none;
  background: #e8dede;
  cursor: pointer;
  border-radius: 8px;
  margin: 5px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<div id="step1" class="fadeUp show">
  <h1>Aku mau jujur sebentar…</h1>
  <button onclick="goStep2()">lanjut</button>
</div>

<div id="step2" class="hidden">
  <p id="typing"></p>
  <button onclick="goStep3()">lanjut</button>
</div>

<div id="step3" class="hidden blur">
  <h2>Aku suka sama kamu.</h2>
  <p>Bukan karena hal besar, tapi hal kecil yang kamu lakukan.</p>

  <button onclick="jawab('Oke')">Yes</button>
  <button onclick="jawab('aku suka kamu jujur, tapi ga dulu')">No</button>
  <button onclick="jawab('makasih ya')">Sorry</button>
</div>

</div>

<!-- AUDIO -->
<audio id="bgm" loop src="golden hour (piano instrumental).mp3"></audio>
<audio id="clickSfx" src="mixkit-select-click-1109.wav"></audio>
<audio id="whooshSfx" src="mixkit-air-woosh-1489.wav"></audio>
<audio id="chimeSfx" src="mixkit-correct-answer-tone-2870.wav"></audio>

<script>
// ===== BASIC SFX =====
function clickSfx(){
  let s = document.getElementById("clickSfx");
  s.volume = 0.35;
  s.currentTime = 0;
  s.play();
}

function whooshSfx(){
  let s = document.getElementById("whooshSfx");
  s.volume = 0.25;
  s.currentTime = 0;
  s.play();
}

function chimeSfx(){
  let s = document.getElementById("chimeSfx");
  s.volume = 0.3;
  s.play();
}

// ===== BGM =====
function startBGM(){
  let bgm = document.getElementById("bgm");
  bgm.volume = 0;
  bgm.play();

  let v = 0;
  let fade = setInterval(()=>{
    if(v < 0.25){
      v += 0.02;
      bgm.volume = v;
    } else {
      clearInterval(fade);
    }
  },200);
}

// ===== WEB AUDIO TYPEWRITER (NO DELAY) =====
let audioCtx;
let typeBuffer;
let lastSoundTime = 0;
const SOUND_INTERVAL = 80;

async function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const res = await fetch("type.mp3"); // ganti sesuai file kamu
  const buf = await res.arrayBuffer();
  typeBuffer = await audioCtx.decodeAudioData(buf);
}

function playTypeSound(char, i){
  if(!typeBuffer) return;

  const now = performance.now();

  if(char === " " || char === "\n") return;
  if(i % 2 !== 0) return;
  if(now - lastSoundTime < SOUND_INTERVAL) return;

  lastSoundTime = now;

  const source = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();

  source.buffer = typeBuffer;
  gain.gain.value = 0.08 + Math.random()*0.05;

  source.connect(gain);
  gain.connect(audioCtx.destination);

  source.start(0);
}

// ===== TYPEWRITER =====
const text = "Aku nggak jago ngomong panjang lebar.\nTapi ada hal yang pengen aku sampaikan.";
let i = 0;

function typeWriter(){
  let el = document.getElementById("typing");

  if(i < text.length){
    let char = text.charAt(i);

    if(char === "\n"){
      el.innerHTML += "<br>";
    } else {
      el.innerHTML += char;
    }

    playTypeSound(char, i);

    i++;
    setTimeout(typeWriter, 35);
  }
}

// ===== FLOW =====
async function goStep2(){
  clickSfx();

  if(!audioCtx){
    await initAudio();
  }

  startBGM();

  document.getElementById("step1").classList.remove("show");

  setTimeout(()=>{
    document.getElementById("step1").style.display = "none";

    let step2 = document.getElementById("step2");
    step2.classList.remove("hidden");
    step2.classList.add("fadeUp","show");

    whooshSfx();
    typeWriter();
  },500);
}

function goStep3(){
  clickSfx();

  let step2 = document.getElementById("step2");
  step2.classList.remove("show");

  setTimeout(()=>{
    step2.style.display = "none";

    let step3 = document.getElementById("step3");
    step3.classList.remove("hidden");
    step3.classList.add("show");

    whooshSfx();
  },500);
}

// ===== JAWABAN =====
function jawab(res){
  clickSfx();

  setTimeout(()=>{
    chimeSfx();
    alert("makasih 🙂");

    const nomor = "6289522238269"; // ganti
    const url = `https://wa.me/${nomor}?text=${encodeURIComponent("Jawaban: "+res)}`;

    setTimeout(()=>{
      window.location.href = url;
    },800);

  },300);
}
</script>

</body>
</html>
